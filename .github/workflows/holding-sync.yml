name: 持仓截图自动处理

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  process-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'holding-sync')

    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🔤 安装 Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-chi-sim tesseract-ocr-eng
          tesseract --version
          tesseract --list-langs

      - name: 📋 提取 Issue 信息
        id: issue_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
            ISSUE_TITLE="${{ github.event.issue.title }}"
            ISSUE_BODY="${{ github.event.issue.body }}"
          else
            LATEST=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/issues?labels=holding-sync&state=open&per_page=1" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['number'] if d else '')")
            if [ -z "$LATEST" ]; then
              echo "没有待处理的 holding-sync Issue，跳过"
              echo "has_issue=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            ISSUE_NUM="$LATEST"
            ISSUE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$LATEST")
            ISSUE_TITLE=$(echo "$ISSUE_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
            ISSUE_BODY=$(echo "$ISSUE_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['body'] or '')")
          fi
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
          echo "ISSUE_NUM=$ISSUE_NUM" >> $GITHUB_ENV
          echo "$ISSUE_BODY" > /tmp/issue_body.txt
          echo "Issue #$ISSUE_NUM: $ISSUE_TITLE"

      - name: ⏭️ 跳过（无待处理 Issue）
        if: steps.issue_info.outputs.issue_num == ''
        run: echo "没有待处理的 Issue，退出"

      - name: 🔍 下载 Issue 中的图片
        if: steps.issue_info.outputs.issue_num != ''
        run: |
          mkdir -p /tmp/screenshots
          python3 scripts/extract_images.py /tmp/issue_body.txt /tmp/screenshots
          echo "下载完成"
          ls -la /tmp/screenshots/ 2>/dev/null || echo "（无截图文件）"

      - name: 🏷️ 标记为处理中
        if: steps.issue_info.outputs.issue_num != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMG_COUNT=$(ls /tmp/screenshots/ 2>/dev/null | wc -l)
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"labels":["holding-sync","processing"]}' \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.issue_info.outputs.issue_num }}/labels" 2>/dev/null || true
          python3 -c "
          import json, urllib.request
          msg = {'body': f'## 🔄 云端处理中\n\n已收到 **{env_var}** 张截图，正在自动OCR识别...\n\n预计 1-2 分钟完成'.replace('env_var', str($IMG_COUNT))}
          req = urllib.request.Request(
            f'https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.issue_info.outputs.issue_num }}/comments',
            data=json.dumps(msg).encode(),
            headers={'Authorization': 'token ${{ secrets.GITHUB_TOKEN }}', 'Content-Type': 'application/json'}
          )
          urllib.request.urlopen(req)
          "

      - name: 🔤 OCR 识别
        if: steps.issue_info.outputs.issue_num != ''
        run: |
          mkdir -p /tmp/ocr_results
          python3 scripts/ocr_screenshots.py /tmp/screenshots /tmp/ocr_results /tmp/ocr_combined.txt

      - name: 🧠 解析并更新 holdings.md
        if: steps.issue_info.outputs.issue_num != ''
        run: |
          python3 scripts/update_holdings.py /tmp/ocr_combined.txt portfolio/holdings.md

      - name: 📊 审核报告评论
        if: steps.issue_info.outputs.issue_num != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/post_review_report.py ${{ steps.issue_info.outputs.issue_num }} /tmp/update_status.json /tmp/ocr_combined.txt

      - name: 📤 提交并推送
        if: steps.issue_info.outputs.issue_num != ''
        run: |
          UPDATED=$(python3 -c "import json; print(json.load(open('/tmp/update_status.json')).get('updated', False))")
          if [ "$UPDATED" = "False" ]; then
            echo "OCR 数据不足，跳过推送"
            echo "skip_push=true" >> $GITHUB_ENV
            exit 0
          fi
          BASE_DATE=$(cat /tmp/base_date.txt 2>/dev/null || echo "unknown")
          git config user.name "Apex Capital Bot"
          git config user.email "bot@apexcapital.local"
          git add portfolio/holdings.md
          if git diff --cached --quiet; then
            echo "holdings.md 无变更"
            echo "skip_push=true" >> $GITHUB_ENV
          else
            git commit -m "🔄 OCR截图同步 ${BASE_DATE}（Issue #${{ steps.issue_info.outputs.issue_num }}）"
            git push origin main
            echo "已推送到 GitHub"
            echo "skip_push=false" >> $GITHUB_ENV
          fi

      - name: 🎉 关闭 Issue
        if: steps.issue_info.outputs.issue_num != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPDATED=$(python3 -c "import json; print(json.load(open('/tmp/update_status.json')).get('updated', False))")
          BASE_DATE=$(cat /tmp/base_date.txt 2>/dev/null || echo "unknown")
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"state":"closed"}' \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.issue_info.outputs.issue_num }}"
          if [ "$UPDATED" = "True" ]; then
            MSG="## ✅ 处理完成 - holdings.md 已更新, 仪表盘1-2分钟内刷新"
          else
            MSG="## ⚠️ OCR数据不足未更新, 请重新截图上传或用WorkBuddy对话更新"
          fi
          python3 -c "
          import json, urllib.request
          req = urllib.request.Request(
            f'https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.issue_info.outputs.issue_num }}/comments',
            data=json.dumps({'body': '''$MSG'''}).encode(),
            headers={'Authorization': 'token ${{ secrets.GITHUB_TOKEN }}', 'Content-Type': 'application/json'}
          )
          urllib.request.urlopen(req)
          "
          echo "Issue 已关闭"
